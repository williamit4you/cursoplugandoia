name: YouTube Analytics Daily Refresh

on:
  schedule:
    # 06:10 UTC ~= 03:10 (America/Sao_Paulo, em horário padrão)
    - cron: "10 6 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call cron endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "Missing SITE_URL secret"
            exit 1
          fi
          URL="$SITE_URL/api/youtube-analytics/cron"
          if [ -n "$CRON_SECRET" ]; then
            URL="$URL?secret=$CRON_SECRET"
          fi
          echo "Calling: $URL"
          curl -fsSL "$URL"

